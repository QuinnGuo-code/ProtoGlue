name: protoglue
channels:
  - conda-forge
  - pytorch
dependencies:
  - python=3.10
  - pip
  - numpy>=1.21
  - pandas>=1.3
  - scipy>=1.7
  - scikit-learn>=1.0
  - matplotlib>=3.5
  - seaborn>=0.11
  - anndata>=0.8
  - scanpy>=1.9
  - jupyter
  - notebook
  - pytorch>=1.12
  - cpuonly  # replace with pytorch-cuda=11.8 or 12.1 for GPU
  - pip:
      - umap-learn
      - python-pptx
      - Pillow
